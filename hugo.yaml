            date: "Sep 2025 - Dec 2025"
            content: |-
              - Engineered dynamic KPI dashboards monitoring 15+ governance and compliance metrics, accelerating investment decision cycles by ~30% and increasing cross-team reporting efficiency.
              - Maintained 100% audit accuracy across all investment activity records by executing rigorous regulatory compliance and internal audit protocols spanning the full investment operations lifecycle.
              - Conducted comprehensive operational reviews of mid-market portfolio companies to identify efficiency gaps, directly supporting the firm's broader value-creation and buyout strategies.

      - company: "Enrichwise Financial Services"
        jobs:
          - designation: "<span style='font-size: 0.9em; font-weight: 500;'>Wealth Management Intern</span>"
            date: "May 2024 - Aug 2024"
            content: |-
              - Managed and optimized 50+ client portfolios totaling $8M+ AUM using FactSet analytics to identify market trends, rebalance allocations, and drive measurable performance growth.
              - Designed customized asset diversification strategies that reduced client risk exposure, contributing to a 95%+ client retention rate across a book of high-net-worth accounts.
              - Spearheaded comprehensive financial planning initiatives, integrating tax advisory and regulatory reporting to provide holistic investment strategies tailored to individual client goals.

      - company: "Sapphire Foods India Limited"
        jobs:
          - designation: "<span style='font-size: 0.9em; font-weight: 500;'>FP&A Intern</span>"
            date: "Jun 2023 - Aug 2023"
            content: |-
              - Built regional budget-vs-actual tracking dashboards in Excel, improving sales forecasting precision by 20% across 5+ operational zones and accelerating monthly close cycles by 1 week.
              - Analyzed large-scale financial models and cost structures to surface $200K+ in annualized cost-saving opportunities, directly improving enterprise-wide financial efficiency.
              - Evaluated unit-level economics and store profitability using Pacesetter benchmarking, isolating drivers of margin compression across multiple retail formats to advise strategic pricing adjustments.

