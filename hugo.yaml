    enable: true
    title: "About Me"
    image: "images/ap_image.jpeg"
    content: |-
      I am a Business Analytics and Finance dual-degree candidate at the University of Cincinnati (expected May 2027) with a passion for delivering data-driven insights. 

      With over three years of progressive experience, I specialize in optimizing portfolio performance, reducing cost exposure, and accelerating strategic investment decisions. My technical toolkit includes Python, SQL, Excel, Power BI, and Tableau, which I leverage for financial modeling, DCF valuation, and KPI dashboard development.
    skills:
      enable: true
      title: "Here are a few tools and technologies I use:"
